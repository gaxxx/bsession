services:
  agent-browser:
    image: ghcr.io/gaxxx/bsession:latest
    build: .
    container_name: agent-browser
    ports:
      - "5900:5900"   # VNC
      - "6080:6080"   # noVNC web
      - "8080:8080"   # bsession API
    volumes:
      - ./workspace:/workspace
    env_file:
      - .env
    environment:
      - DISPLAY=:99
    networks:
      - bsession
    restart: unless-stopped

networks:
  bsession:
    name: bsession
    driver: bridge

# Amazon Product Price Monitor — bsession skill
#
# Tracks a product's price and availability. Notifies on price change.
# Handles bot detection and "sign in" interstitials.

name: amazon_price
description: "Monitor Amazon product price and notify on changes"
version: "1.0.0"

tags:
  - monitor
  - ecommerce
  - price

tools_used:
  - browser.navigate
  - browser.find
  - browser.extract
  - bypass.cloudflare
  - notify.webhook

params:
  - name: PRODUCT_URL
    description: "Full Amazon product URL"
    required: true
  - name: CHECK_INTERVAL
    description: "Seconds between checks"
    required: false
    default: "3600"
  - name: WEBHOOK_URL
    description: "Webhook URL for price change alerts"
    required: false
    default: ""

steps:
  # 1. Navigate to the product page
  - action: navigate
    url: "{{PRODUCT_URL}}"
    wait: 8

  # 2. Handle bot detection / CAPTCHA if present
  - action: bypass
    type: cloudflare

  # 3. Check for bot block page
  - action: snapshot
    name: product_page

  - action: check
    snapshot_pattern: "(?i)product|price|add to cart|buy now"
    error: "Did not land on product page — possible bot block or redirect"

  # 4. Extract product title
  - action: extract
    name: product_title
    pattern: 'heading "([^"]*)"'
    max_lines: 1

  # 5. Extract price — Amazon shows price in multiple formats
  #    Try the main price span first, then deal/sale price, then whole+fraction
  - action: extract
    name: price_whole
    pattern: "text: \"\\$([\\d,]+\\.?\\d*)\""
    max_lines: 1

  # 6. Extract availability
  - action: extract
    name: availability
    pattern: "(?i)text:.*?(in stock|out of stock|available|unavailable|currently unavailable|only \\d+ left)"
    max_lines: 1

result:
  title: "{{product_title}}"
  price: "{{price_whole}}"
  availability: "{{availability}}"

monitor:
  interval: "{{CHECK_INTERVAL}}"
  change_field: price
  max_failures: 5
  notify:
    webhook: "{{WEBHOOK_URL}}"
    payload:
      session: "{{SESSION_NAME}}"
      product: "{{product_title}}"
      previous_price: "{{_previous}}"
      new_price: "{{price_whole}}"
      availability: "{{availability}}"
      url: "{{PRODUCT_URL}}"
      timestamp: "{{_timestamp}}"
